name: Build and test pull request
on: [pull_request]

jobs:
  Windows:
    name: Build windows version
    runs-on: windows-2022
    timeout-minutes: 180
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Clone vcpkg (pinned)
      shell: pwsh
      run: |
        $v = Join-Path $env:RUNNER_WORKSPACE "vcpkg"
        git clone https://github.com/microsoft/vcpkg.git $v
        Push-Location $v
        git checkout 3b3bd424827a1f7f4813216f6b32b6c61e386b2e
        Pop-Location

    - name: Cache vcpkg (installed + downloads)
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.workspace }}/vcpkg/installed
          ${{ runner.workspace }}/vcpkg/downloads
        key: vcpkg-${{ runner.os }}-x86-windows-static-${{ hashFiles('.github/vcpkg-win-x86-static.cache-key', '.github/scripts/patch-vcpkg-msys-pkgconfig.ps1', '.github/scripts/patch-vcpkg-openal-soft-winmm.ps1') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-x86-windows-static-

    - name: vcpkg patch, bootstrap, install
      shell: pwsh
      run: |
        $v = Join-Path $env:RUNNER_WORKSPACE "vcpkg"
        Push-Location $v
        & "$env:GITHUB_WORKSPACE\.github\scripts\patch-vcpkg-msys-pkgconfig.ps1" $v
        & "$env:GITHUB_WORKSPACE\.github\scripts\patch-vcpkg-openal-soft-winmm.ps1" $v
        .\bootstrap-vcpkg.bat
        .\vcpkg.exe integrate install
        $pkgs = @(
          'boost-iostreams:x86-windows-static','boost-asio:x86-windows-static','boost-beast:x86-windows-static',
          'boost-system:x86-windows-static','boost-variant:x86-windows-static','boost-lockfree:x86-windows-static',
          'boost-process:x86-windows-static','boost-program-options:x86-windows-static','boost-uuid:x86-windows-static',
          'boost-filesystem:x86-windows-static','luajit:x86-windows-static','glew:x86-windows-static',
          'physfs:x86-windows-static','openal-soft:x86-windows-static','libogg:x86-windows-static',
          'libvorbis:x86-windows-static','zlib:x86-windows-static','libzip:x86-windows-static',
          'bzip2:x86-windows-static','openssl:x86-windows-static','liblzma:x86-windows-static'
        )
        .\vcpkg.exe install @pkgs
        Pop-Location

    - name: Compile
      timeout-minutes: 60
      run: |
        cd vc16
        MSBuild otclient.sln /p:Configuration=DirectX /p:Platform=Win32 /p:PlatformToolset=v143 /p:BUILD_REVISION=${{ github.run_number }}
        MSBuild otclient.sln /p:Configuration=OpenGL /p:Platform=Win32 /p:PlatformToolset=v143 /p:BUILD_REVISION=${{ github.run_number }}

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: Binaries
        path: |
          otclient_gl.exe
          otclient_dx.exe
        if-no-files-found: error

  Android:
    name: Build android version
    runs-on: windows-2019
    timeout-minutes: 60
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
          submodules: recursive

    - name: Setup MSBuild and add to PATH
      uses: microsoft/setup-msbuild@v1.0.2
      id: setup_msbuild

    - name: Create data.zip for android
      run: |
        powershell -ExecutionPolicy Bypass -File .\create_android_assets.ps1

    - name: Decompress android libs
      run: |
        7z x android_libs.7z -aoa -oC:\android

    - name: Install android
      run: |
        $sdkRoot = "C:\Android\android-sdk"
        $sdkManager = "$sdkRoot\cmdline-tools\latest\bin\sdkmanager.bat"
        Install-AndroidSDKPackages -AndroidSDKManagerPath $sdkManager `
                                  -AndroidSDKRootPath $sdkRoot `
                                  -AndroidPackages "ndk;21.4.7075529"

    - name: Build for android
      timeout-minutes: 25
      run: |
        cd android
        $env:VS_NdkRoot="C:\Android\android-sdk\ndk\21.4.7075529"
        MSBuild.exe /p:Configuration=Release /p:Platform="ARM64" /p:BUILD_REVISION=${{github.run_number}}

    - name: Upload binaries
      uses: 'actions/upload-artifact@v2'
      with:
        name: Binaries
        path: |
          otclientv8.apk
        if-no-files-found: error

  Mac:
    name: Build mac os version
    runs-on: 	macos-11
    timeout-minutes: 60
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
          submodules: recursive

    - name: Get latest CMake
      uses: lukka/get-cmake@latest

    - name: MacOS - install physfs pkgconfig luajit xquartz
      run: brew install physfs pkgconfig luajit xquartz

    - name: Run vcpkg
      uses: lukka/run-vcpkg@v7
      with:
        vcpkgArguments: >
          boost-iostreams boost-asio boost-system boost-variant boost-lockfree boost-beast glew 
          boost-filesystem boost-uuid libogg libvorbis zlib opengl libzip openal-soft bzip2
          boost-process openssl
        vcpkgDirectory: ${{ runner.workspace }}/vcpkg/
        vcpkgTriplet: x64-osx
        vcpkgGitCommitId: 761c81d43335a5d5ccc2ec8ad90bd7e2cbba734e

    - name: Build with CMake
      uses: lukka/run-cmake@v3
      with:
        buildDirectory: ${{ runner.workspace }}/build
        cmakeAppendedArgs: '-G Ninja -DCMAKE_BUILD_TYPE="Release" -DVERSION=${{github.run_number}} -DCMAKE_CXX_FLAGS="-Wno-c++11-narrowing"'
        cmakeListsOrSettingsJson: CMakeListsTxtAdvanced
        useVcpkgToolchainFile: true

    - name: Change name
      run: |
        mv '${{ runner.workspace }}/build/otclient' '${{ runner.workspace }}/build/otclient_mac'

    - name: Upload otclient
      uses: actions/upload-artifact@v2
      with:
        name: Binaries
        path: |
          ${{ runner.workspace }}/build/otclient_mac
        if-no-files-found: error

  Linux:
    name: Build linux version
    runs-on: ubuntu-20.04
    timeout-minutes: 60
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
          submodules: recursive

    - name: Get latest CMake
      uses: lukka/get-cmake@latest

    - name: Ubuntu - install opengl lua5.1 luajit
      run: sudo apt update && sudo apt install -y libglew-dev liblua5.1-0-dev libluajit-5.1-dev

    - name: Run vcpkg
      uses: lukka/run-vcpkg@v7
      with:
        vcpkgArguments: >
          boost-iostreams boost-asio boost-system boost-variant boost-lockfree boost-beast glew 
          boost-filesystem boost-uuid libogg libvorbis zlib opengl libzip openal-soft bzip2
          boost-process openssl physfs
        vcpkgDirectory: ${{ runner.workspace }}/vcpkg/
        vcpkgTriplet: x64-linux
        vcpkgGitCommitId: 761c81d43335a5d5ccc2ec8ad90bd7e2cbba734e

    - name: Build with CMake
      uses: lukka/run-cmake@v3
      with:
        buildDirectory: ${{ runner.workspace }}/build
        cmakeAppendedArgs: '-G Ninja -DCMAKE_BUILD_TYPE="Release" -DVERSION=${{github.run_number}}'
        cmakeListsOrSettingsJson: CMakeListsTxtAdvanced
        useVcpkgToolchainFile: true

    - name: Change name
      run: |
        mv '${{ runner.workspace }}/build/otclient' '${{ runner.workspace }}/build/otclient_linux'

    - name: Upload otclient
      uses: actions/upload-artifact@v2
      with:
        name: Binaries
        path: |
          ${{ runner.workspace }}/build/otclient_linux
        if-no-files-found: error

  Test:
    name: Test
    runs-on: windows-2019
    needs: [Windows, Android, Mac, Linux]
    timeout-minutes: 120
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: Download binaries
      uses: actions/download-artifact@v2
      with:
        name: Binaries

    - name: Run tests
      timeout-minutes: 10
      run: |
        7z x tests.7z -aoa
        $process = (Start-Process -Wait -PassThru otclient_dx.exe --test)
        Get-Content otclientv8.log
        if ($process.ExitCode -ne 0) {
          throw "Invalid exit code: " + $process.ExitCode;
        }

    - name: Upload otclientv8.log
      uses: actions/upload-artifact@v2
      with:
        path: otclientv8.log
        name: Download-otclientv8.log
        if-no-files-found: error

    - name: Copy screenshots
      run: |
        $location = Get-Location
        $pillowScript = @"
        from PIL import Image
        import glob

        for file in glob.glob('*.png'):
          Image.open(file).convert('RGB').save(
            file[:-3] + 'jpg',
            quality=50,
          )
        "@
        cd $env:appdata\otclientv8\otclientv8
        pip3 install pillow
        python3 -c $pillowScript
        cd $location
        mkdir screenshots
        Get-ChildItem $env:appdata\otclientv8\otclientv8 -Filter *.jpg `
        | Copy-Item -Destination screenshots -Force -PassThru

    - name: Upload screenshot
      uses: actions/upload-artifact@v2
      with:
        path: screenshots
        name: Download-screenshots
    
    - name: Cleanup things
      run: |
        Remove-Item 'data\things' -Recurse

    - name: Upload otclient
      uses: actions/upload-artifact@v2
      with:
        name: Download-otclientv8
        path: |
          otclient_gl.exe
          otclient_dx.exe
          otclientv8.apk
          otclient_mac
          otclient_linux
          *.dll
          data
          modules
          layouts
          mods
          init.lua
        if-no-files-found: error
