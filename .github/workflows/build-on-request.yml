# Manual Windows build — same toolchain as ci-cd.yml (windows-2022, patched vcpkg, v143).
name: Build on request
on: [workflow_dispatch]

jobs:
  Windows:
    name: Build windows version
    runs-on: windows-2022
    timeout-minutes: 180

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Clone vcpkg (pinned)
      shell: pwsh
      run: |
        $v = Join-Path $env:RUNNER_WORKSPACE "vcpkg"
        git clone https://github.com/microsoft/vcpkg.git $v
        Push-Location $v
        git checkout 3b3bd424827a1f7f4813216f6b32b6c61e386b2e
        Pop-Location

    - name: Cache vcpkg (installed + downloads)
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.workspace }}/vcpkg/installed
          ${{ runner.workspace }}/vcpkg/downloads
        key: vcpkg-${{ runner.os }}-x86-windows-static-${{ hashFiles('.github/vcpkg-win-x86-static.cache-key', '.github/scripts/patch-vcpkg-msys-pkgconfig.ps1', '.github/scripts/patch-vcpkg-openal-soft-winmm.ps1') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-x86-windows-static-

    - name: vcpkg patch, bootstrap, install
      shell: pwsh
      run: |
        $v = Join-Path $env:RUNNER_WORKSPACE "vcpkg"
        Push-Location $v
        & "$env:GITHUB_WORKSPACE\.github\scripts\patch-vcpkg-msys-pkgconfig.ps1" $v
        & "$env:GITHUB_WORKSPACE\.github\scripts\patch-vcpkg-openal-soft-winmm.ps1" $v
        .\bootstrap-vcpkg.bat
        .\vcpkg.exe integrate install
        $pkgs = @(
          'boost-iostreams:x86-windows-static','boost-asio:x86-windows-static','boost-beast:x86-windows-static',
          'boost-system:x86-windows-static','boost-variant:x86-windows-static','boost-lockfree:x86-windows-static',
          'boost-process:x86-windows-static','boost-program-options:x86-windows-static','boost-uuid:x86-windows-static',
          'boost-filesystem:x86-windows-static','luajit:x86-windows-static','glew:x86-windows-static',
          'physfs:x86-windows-static','openal-soft:x86-windows-static','libogg:x86-windows-static',
          'libvorbis:x86-windows-static','zlib:x86-windows-static','libzip:x86-windows-static',
          'bzip2:x86-windows-static','openssl:x86-windows-static','liblzma:x86-windows-static'
        )
        .\vcpkg.exe install @pkgs
        Pop-Location

    - name: Compile otclient_dx
      timeout-minutes: 60
      run: |
        cd vc16
        MSBuild otclient.sln /p:Configuration=DirectX /p:Platform=Win32 /p:PlatformToolset=v143 /p:BUILD_REVISION=${{ github.run_number }}

    - name: Compile otclient_gl
      timeout-minutes: 60
      run: |
        cd vc16
        MSBuild otclient.sln /p:Configuration=OpenGL /p:Platform=Win32 /p:PlatformToolset=v143 /p:BUILD_REVISION=${{ github.run_number }}

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: Download-binaries
        path: |
          otclient_gl.exe
          otclient_dx.exe
        if-no-files-found: error
