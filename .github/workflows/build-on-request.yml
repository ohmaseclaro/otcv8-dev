name: Build on request
on: [workflow_dispatch]

jobs:
  Windows:
    name: Build windows version
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild and add to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore vcpkg cache
        id: vcpkg-cache-restore
        uses: actions/cache/restore@v4
        with:
          key: vcpkg-win-x86-static-3b3bd424827a1f7f4813216f6b32b6c61e386b2e-v1
          restore-keys: |
            vcpkg-win-x86-static-3b3bd424827a1f7f4813216f6b32b6c61e386b2e-
            vcpkg-win-x86-static-
          path: ${{ runner.workspace }}/vcpkg

      - name: Run vcpkg
        id: run-vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = "${{ runner.workspace }}\vcpkg"
          if (!(Test-Path "$vcpkgRoot\.git")) {
            git clone https://github.com/microsoft/vcpkg.git "$vcpkgRoot"
          }
          git -C "$vcpkgRoot" checkout --force 3b3bd424827a1f7f4813216f6b32b6c61e386b2e
          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics

          # Old bzip2 port on this pinned vcpkg requires stale MSYS artifacts; skip only pkgconfig fixup.
          $bzPort = "$vcpkgRoot\ports\bzip2\portfile.cmake"
          $bz = Get-Content $bzPort -Raw
          if ($bz -match "(?m)^\s*vcpkg_fixup_pkgconfig\(\)\s*$") {
            $bz = $bz -replace "(?m)^\s*vcpkg_fixup_pkgconfig\(\)\s*$", "# patched in CI: skip msys pkgconfig fixup"
            Set-Content $bzPort $bz
          }

          & "$vcpkgRoot\vcpkg.exe" install --triplet x86-windows-static --clean-after-build boost-iostreams boost-asio boost-beast boost-system boost-variant boost-lockfree boost-process boost-program-options boost-uuid boost-filesystem luajit glew physfs openal-soft libogg libvorbis zlib libzip openssl

      - name: Save vcpkg cache
        if: steps.vcpkg-cache-restore.outputs.cache-hit != 'true' && steps.run-vcpkg.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          key: vcpkg-win-x86-static-3b3bd424827a1f7f4813216f6b32b6c61e386b2e-v1
          path: ${{ runner.workspace }}/vcpkg

      - name: Integrate vcpkg
        run: |
          ${{ runner.workspace }}\vcpkg\vcpkg integrate install

      - name: Compile otclient_dx
        timeout-minutes: 20
        run: |
          cd vc16
          MSBuild /property:Configuration=DirectX /p:PlatformToolset=v142 /p:BUILD_REVISION=${{github.run_number}}

      - name: Compile otclient_gl
        timeout-minutes: 20
        run: |
          cd vc16
          MSBuild /property:Configuration=OpenGL /p:PlatformToolset=v142 /p:BUILD_REVISION=${{github.run_number}}

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: Download-binaries-windows
          path: |
            otclient_gl.exe
            otclient_dx.exe
          if-no-files-found: error
