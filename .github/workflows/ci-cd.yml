name: Build, Test, Release 3.2
on:
  push:
    branches:
      - main
      - master

jobs:
  Windows:
    name: Build windows version
    runs-on: windows-2022
    timeout-minutes: 90
    if: |
      !contains(github.event.head_commit.message, '[skip release]')
      && (
        startsWith(github.ref, 'refs/tags/')
        || github.ref == 'refs/heads/main'
        || github.ref == 'refs/heads/master'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild and add to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore vcpkg cache
        id: vcpkg-cache-restore
        uses: actions/cache/restore@v4
        with:
          key: vcpkg-win-x86-static-3b3bd424827a1f7f4813216f6b32b6c61e386b2e-v1
          restore-keys: |
            vcpkg-win-x86-static-3b3bd424827a1f7f4813216f6b32b6c61e386b2e-
            vcpkg-win-x86-static-
          path: ${{ runner.workspace }}/vcpkg

      - name: Run vcpkg
        id: run-vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = "${{ runner.workspace }}\vcpkg"
          if (!(Test-Path "$vcpkgRoot\.git")) {
            git clone https://github.com/microsoft/vcpkg.git "$vcpkgRoot"
          }
          git -C "$vcpkgRoot" checkout --force 3b3bd424827a1f7f4813216f6b32b6c61e386b2e
          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics

          # windows-2022 does not expose VS2019 generator; build vcpkg deps with v143.
          $env:VCPKG_PLATFORM_TOOLSET = "v143"

          # Pinned legacy openal-soft port forces VS2019 generator; rewrite for windows-2022.
          $openalPort = "$vcpkgRoot\ports\openal-soft\portfile.cmake"
          if (Test-Path $openalPort) {
            $openal = Get-Content $openalPort -Raw
            $openal = $openal -replace "Visual Studio 16 2019", "Visual Studio 17 2022"
            Set-Content $openalPort $openal
          }

          # Pinned legacy vcpkg scripts fetch stale MSYS artifacts during pkgconfig fixups.
          # Override fixup helper to avoid mirror 404s (bzip2/liblzma and similar ports).
          $fixupScript = "$vcpkgRoot\scripts\cmake\vcpkg_fixup_pkgconfig.cmake"
          Set-Content $fixupScript @"
          function(vcpkg_fixup_pkgconfig)
            message(STATUS "Patched in CI: skipping vcpkg_fixup_pkgconfig to avoid legacy MSYS downloads")
          endfunction()
          "@

          & "$vcpkgRoot\vcpkg.exe" install --triplet x86-windows-static --clean-after-build boost-iostreams boost-asio boost-beast boost-system boost-variant boost-lockfree boost-process boost-program-options boost-uuid boost-filesystem luajit glew physfs openal-soft libogg libvorbis zlib libzip openssl liblzma
          if ($LASTEXITCODE -ne 0) {
            Write-Host "vcpkg install failed; dumping latest buildtrees logs"
            Get-ChildItem "$vcpkgRoot\buildtrees" -Recurse -Filter "*-out.log" |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 20 |
              ForEach-Object {
                Write-Host "===== $($_.FullName) ====="
                Get-Content $_.FullName -Tail 200
              }
            exit $LASTEXITCODE
          }

      - name: Save vcpkg cache
        if: steps.vcpkg-cache-restore.outputs.cache-hit != 'true' && steps.run-vcpkg.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          key: vcpkg-win-x86-static-3b3bd424827a1f7f4813216f6b32b6c61e386b2e-v1
          path: ${{ runner.workspace }}/vcpkg

      - name: Integrate vcpkg
        run: |
          ${{ runner.workspace }}\vcpkg\vcpkg integrate install

      - name: Compile
        timeout-minutes: 60
        run: |
          cd vc16
          MSBuild /property:Configuration=DirectX /p:PlatformToolset=v142 /p:BUILD_REVISION=${{github.run_number}}
          MSBuild /property:Configuration=OpenGL /p:PlatformToolset=v142 /p:BUILD_REVISION=${{github.run_number}}

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: Binaries-windows
          path: |
            otclient_gl.exe
            otclient_dx.exe
            lib.7z
          if-no-files-found: error

  Release:
    name: Test and release
    runs-on: windows-2022
    needs: [Windows]
    timeout-minutes: 120
    if: |
      !contains(github.event.head_commit.message, '[skip release]')
      && (
        startsWith(github.ref, 'refs/tags/')
        || github.ref == 'refs/heads/main'
        || github.ref == 'refs/heads/master'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: Binaries-*
          merge-multiple: true

      - name: Run tests
        timeout-minutes: 10
        run: |
          7z x tests.7z -aoa
          $process = (Start-Process -Wait -PassThru otclient_dx.exe --test)
          Get-Content otclientv8.log
          if ($process.ExitCode -ne 0) {
            throw "Invalid exit code: " + $process.ExitCode;
          }

      - name: Upload otclientv8.log
        uses: actions/upload-artifact@v4
        with:
          path: otclientv8.log
          name: Download-otclientv8.log
          if-no-files-found: error

      - name: Copy screenshots
        run: |
          $location = Get-Location
          $pillowScript = @"
          from PIL import Image
          import glob

          for file in glob.glob('*.png'):
            Image.open(file).convert('RGB').save(
              file[:-3] + 'jpg',
              quality=50,
            )
          "@
          cd $env:appdata\otclientv8\otclientv8
          pip3 install pillow
          python3 -c $pillowScript
          cd $location
          mkdir screenshots
          Get-ChildItem $env:appdata\otclientv8\otclientv8 -Filter *.jpg `
          | Copy-Item -Destination screenshots -Force -PassThru

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          path: screenshots
          name: Download-screenshots

      - name: Cleanup things
        run: |
          Remove-Item 'data\things' -Recurse

      - name: Set version
        run: |
          $version = Select-String -path otclientv8.log '(OTCv8 [^(]+)' |
            select-object -First 1 |
            % { $_.Matches } |
            % { $_.Value }
          "VERSION=${version}" | Add-Content -Path $ENV:GITHUB_ENV

      - name: Upload otclient
        uses: actions/upload-artifact@v4
        with:
          name: Download-otclientv8
          path: |
            otclient_gl.exe
            otclient_dx.exe
            *.dll
            data
            modules
            layouts
            mods
            init.lua
          if-no-files-found: error

      - name: Checkout public otclientv8
        uses: actions/checkout@v4
        with:
          repository: OTCv8/otclientv8
          path: otclientv8
          submodules: recursive
          token: "${{ secrets.otcv8_token }}"

      - name: Update public otclientv8 files
        run: |
          cd otclientv8
          git rm . -f -r --ignore-unmatch
          git checkout HEAD -- README.md LICENSE
          cd ..

          robocopy `
          . `
          otclientv8 `
          init.lua `
          otclient_dx.exe `
          otclient_gl.exe `
          libGLESv2.dll `
          libEGL.dll `
          d3dcompiler_47.dll

          robocopy data otclientv8/data /s
          robocopy layouts otclientv8/layouts /s
          robocopy mods otclientv8/mods /s
          robocopy modules otclientv8/modules /s
          exit 0

      - name: Commit public otclientv8
        uses: EndBug/add-and-commit@v9
        with:
          cwd: otclientv8
          push: true
          author_name: OTCv8
          author_email: otclient@otclient.ovh
          message: "Updated to ${{ env.VERSION }}"
