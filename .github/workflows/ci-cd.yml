# Windows-only CI on windows-2022. MSBuild uses v143 so it matches vcpkg static libs built with VS 2022.
name: Build, Test, Release 3.2
on:
  push:
    branches:
      - main
      - master

jobs:
  Windows:
    name: Build windows version
    runs-on: windows-2022
    timeout-minutes: 180
    if: |
      !contains(github.event.head_commit.message, '[skip release]')
      && (
        startsWith(github.ref, 'refs/tags/')
        || github.ref == 'refs/heads/main'
        || github.ref == 'refs/heads/master'
      )
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Clone vcpkg (pinned)
      shell: pwsh
      run: |
        $v = Join-Path $env:RUNNER_WORKSPACE "vcpkg"
        git clone https://github.com/microsoft/vcpkg.git $v
        Push-Location $v
        git checkout 3b3bd424827a1f7f4813216f6b32b6c61e386b2e
        Pop-Location

    - name: Cache vcpkg (installed + downloads)
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.workspace }}/vcpkg/installed
          ${{ runner.workspace }}/vcpkg/downloads
        key: vcpkg-${{ runner.os }}-x86-windows-static-${{ hashFiles('.github/vcpkg-win-x86-static.cache-key', '.github/scripts/patch-vcpkg-msys-pkgconfig.ps1', '.github/scripts/patch-vcpkg-openal-soft-winmm.ps1') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-x86-windows-static-

    - name: vcpkg patch, bootstrap, install
      shell: pwsh
      run: |
        $v = Join-Path $env:RUNNER_WORKSPACE "vcpkg"
        Push-Location $v
        & "$env:GITHUB_WORKSPACE\.github\scripts\patch-vcpkg-msys-pkgconfig.ps1" $v
        & "$env:GITHUB_WORKSPACE\.github\scripts\patch-vcpkg-openal-soft-winmm.ps1" $v
        .\bootstrap-vcpkg.bat
        .\vcpkg.exe integrate install
        $pkgs = @(
          'boost-iostreams:x86-windows-static','boost-asio:x86-windows-static','boost-beast:x86-windows-static',
          'boost-system:x86-windows-static','boost-variant:x86-windows-static','boost-lockfree:x86-windows-static',
          'boost-process:x86-windows-static','boost-program-options:x86-windows-static','boost-uuid:x86-windows-static',
          'boost-filesystem:x86-windows-static','luajit:x86-windows-static','glew:x86-windows-static',
          'physfs:x86-windows-static','openal-soft:x86-windows-static','libogg:x86-windows-static',
          'libvorbis:x86-windows-static','zlib:x86-windows-static','libzip:x86-windows-static',
          'bzip2:x86-windows-static','openssl:x86-windows-static','liblzma:x86-windows-static'
        )
        .\vcpkg.exe install @pkgs
        Pop-Location

    - name: Compile
      timeout-minutes: 60
      run: |
        cd vc16
        MSBuild otclient.sln /p:Configuration=DirectX /p:Platform=Win32 /p:PlatformToolset=v143 /p:BUILD_REVISION=${{ github.run_number }}
        MSBuild otclient.sln /p:Configuration=OpenGL /p:Platform=Win32 /p:PlatformToolset=v143 /p:BUILD_REVISION=${{ github.run_number }}

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: Binaries
        path: |
          otclient_gl.exe
          otclient_dx.exe
        if-no-files-found: error

  Release:
    name: Test and release
    runs-on: windows-2022
    needs: [Windows]
    timeout-minutes: 120
    if: |
      !contains(github.event.head_commit.message, '[skip release]')
      && (
        startsWith(github.ref, 'refs/tags/')
        || github.ref == 'refs/heads/main'
        || github.ref == 'refs/heads/master'
      )
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download binaries
      uses: actions/download-artifact@v4
      with:
        name: Binaries

    - name: Run tests
      timeout-minutes: 10
      run: |
        7z x tests.7z -aoa
        $process = (Start-Process -Wait -PassThru otclient_dx.exe --test)
        Get-Content otclientv8.log
        if ($process.ExitCode -ne 0) {
          throw "Invalid exit code: " + $process.ExitCode;
        }

    - name: Upload otclientv8.log
      uses: actions/upload-artifact@v4
      with:
        path: otclientv8.log
        name: Download-otclientv8.log
        if-no-files-found: error

    - name: Copy screenshots
      run: |
        $location = Get-Location
        $pillowScript = @"
        from PIL import Image
        import glob

        for file in glob.glob('*.png'):
          Image.open(file).convert('RGB').save(
            file[:-3] + 'jpg',
            quality=50,
          )
        "@
        cd $env:appdata\otclientv8\otclientv8
        pip3 install pillow
        python3 -c $pillowScript
        cd $location
        mkdir screenshots
        Get-ChildItem $env:appdata\otclientv8\otclientv8 -Filter *.jpg `
        | Copy-Item -Destination screenshots -Force -PassThru

    - name: Upload screenshot
      uses: actions/upload-artifact@v4
      with:
        path: screenshots
        name: Download-screenshots

    - name: Cleanup things
      run: |
        Remove-Item 'data\things' -Recurse

    - name: Set version
      run: |
        $version = Select-String -path otclientv8.log '(OTCv8 [^(]+)' |
          select-object -First 1 |
          % { $_.Matches } |
          % { $_.Value }
        "VERSION=${version}" | Add-Content -Path $ENV:GITHUB_ENV

    - name: Upload otclient
      uses: actions/upload-artifact@v4
      with:
        name: Download-otclientv8
        path: |
          otclient_gl.exe
          otclient_dx.exe
          *.dll
          data
          modules
          layouts
          mods
          init.lua
        if-no-files-found: error

    - name: Checkout public otclientv8
      uses: actions/checkout@v4
      with:
        repository: OTCv8/otclientv8
        path: otclientv8
        submodules: recursive
        token: "${{ secrets.otcv8_token }}"

    - name: Update public otclientv8 files
      run: |
        cd otclientv8
        git rm . -f -r --ignore-unmatch
        git checkout HEAD -- README.md LICENSE
        cd ..

        robocopy `
        . `
        otclientv8 `
        init.lua `
        otclient_dx.exe `
        otclient_gl.exe `
        d3dcompiler_47.dll

        robocopy data otclientv8/data /s
        robocopy layouts otclientv8/layouts /s
        robocopy mods otclientv8/mods /s
        robocopy modules otclientv8/modules /s
        exit 0

    - name: Commit public otclientv8
      uses: EndBug/add-and-commit@v9
      with:
        cwd: otclientv8
        push: true
        author_name: OTCv8
        author_email: otclient@otclient.ovh
        message: "Updated to ${{ env.VERSION }}"
